<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TimelineJS modern static demo</title>
  <link rel="stylesheet" href="../../src/modern/timeline.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f4ef;
      padding: 28px;
    }

    main {
      margin: 0 auto;
      max-width: 1180px;
    }

    .demo-note {
      color: #656c7a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 0 0 24px;
      max-width: 760px;
    }

    .demo-note a {
      color: #9f3030;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <p class="demo-note">
      This no-build demo imports native browser modules and loads <code>timeline.json</code>, the same shape a zm/API Platform endpoint can produce. <a href="https://github.com/tacman/TimelineJS">View on GitHub</a>.
    </p>
    <div id="timeline"></div>
  </main>

  <script type="module">
    import { loadTimeline } from '../../src/modern/index.js';

    try {
      await loadTimeline('#timeline', './timeline.json');
    } catch (error) {
      document.querySelector('#timeline').textContent = error.message;
      console.error(error);
    }
  </script>
</body>
</html>
