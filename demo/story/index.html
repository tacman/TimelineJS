<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exhibit Story contract demo</title>
  <link rel="stylesheet" href="/src/modern/story.css">
  <style>
    body {
      background: #f7f5ef;
      margin: 0;
      min-height: 100vh;
      padding: 28px;
    }

    main {
      margin: 0 auto;
      max-width: 1180px;
    }

    .demo-note {
      color: #626a76;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 0 0 24px;
      max-width: 820px;
    }

    .demo-note a {
      color: #a33d2f;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <p class="demo-note">
      A no-build exhibit-story demo inspired by Fortepan FotoStory and the One Building, Three Businesses exhibit. It renders ordered blocks from a bookmark-folder-shaped JSON document with explicit contexts and connectors.
      <a href="./one-building-three-businesses.json">View JSON</a>.
    </p>
    <article id="story"></article>
  </main>

  <script type="module">
    import { loadStory } from '/src/modern/story.js';

    try {
      await loadStory('#story', './one-building-three-businesses.json');
    } catch (error) {
      document.querySelector('#story').textContent = error.message;
      console.error(error);
    }
  </script>
</body>
</html>
